<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nostr Chat Simulator</title>
<style>
  :root{
    --bg:#0d1117;
    --panel:#151b23;
    --panel2:#1c232e;
    --border:#2a3441;
    --text:#e6edf3;
    --dim:#7d8590;
    --accent:#7c5cff;
    --accent2:#5cd6c0;
    --danger:#ff6b6b;
    --mono: "SF Mono", "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:var(--sans); height:100vh; display:flex; flex-direction:column;
  }
  header{
    padding:10px 16px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
    background:linear-gradient(180deg,#151b23,#0d1117);
  }
  header .logo{
    font-family:var(--mono); font-weight:700; letter-spacing:.5px;
    color:var(--accent2);
  }
  header .logo span{color:var(--accent);}
  header input[type=text]{
    font-family:var(--mono); font-size:12px; background:var(--panel2);
    border:1px solid var(--border); color:var(--text); padding:6px 8px; border-radius:6px;
    min-width:220px;
  }
  header .status{font-family:var(--mono); font-size:12px; margin-left:auto; display:flex; align-items:center; gap:6px;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--danger);}
  .dot.ok{background:var(--accent2); box-shadow:0 0 6px var(--accent2);}
  .dot.pending{background:#e3b341;}

  main{flex:1; display:flex; min-height:0;}
  aside{
    width:280px; border-right:1px solid var(--border); background:var(--panel);
    display:flex; flex-direction:column; overflow:hidden;
  }
  aside h2{
    font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--dim);
    margin:0; padding:12px 14px 8px;
  }
  #userList{flex:1; overflow-y:auto; padding:0 8px;}
  .user-row{
    display:flex; align-items:center; gap:8px; padding:8px 8px; border-radius:8px;
    cursor:pointer; margin-bottom:2px; border:1px solid transparent;
  }
  .user-row:hover{background:var(--panel2);}
  .user-row.active{background:var(--panel2); border-color:var(--accent);}
  .avatar{
    width:30px;height:30px;border-radius:50%; flex:none;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;color:#0d1117; overflow:hidden;
  }
  .avatar img{width:100%;height:100%;object-fit:cover;}
  .user-meta{min-width:0;}
  .user-meta .name{font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .user-meta .pk{font-size:10px; color:var(--dim); font-family:var(--mono);}

  .new-user{padding:10px; border-top:1px solid var(--border);}
  .new-user input{
    width:100%; margin-bottom:6px; background:var(--panel2); border:1px solid var(--border);
    color:var(--text); padding:7px 8px; border-radius:6px; font-size:12px; font-family:var(--sans);
  }
  button{
    cursor:pointer; border:none; border-radius:6px; padding:8px 12px; font-size:12px;
    font-weight:600; font-family:var(--sans);
  }
  .btn-primary{background:var(--accent); color:#fff;}
  .btn-primary:hover{background:#8f72ff;}
  .btn-ghost{background:var(--panel2); color:var(--text); border:1px solid var(--border);}
  .btn-ghost:hover{border-color:var(--accent);}
  .btn-danger{background:transparent; color:var(--danger); border:1px solid var(--danger);}
  .full{width:100%;}

  section.chat{flex:1; display:flex; flex-direction:column; min-width:0;}
  .chat-top{
    padding:8px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center;
    gap:10px; background:var(--panel);
  }
  .chat-top label{font-size:11px; color:var(--dim); font-family:var(--mono);}
  .chat-top input{
    font-family:var(--mono); font-size:12px; background:var(--panel2); border:1px solid var(--border);
    color:var(--accent2); padding:5px 8px; border-radius:6px; width:180px;
  }

  #messages{flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px;}
  .msg{display:flex; gap:10px; max-width:640px;}
  .msg .avatar{width:28px;height:28px;font-size:11px;}
  .msg .bubble{background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:8px 12px;}
  .msg .who{font-size:12px; font-weight:700; color:var(--accent2); margin-bottom:2px;}
  .msg .body{font-size:14px; line-height:1.4; word-wrap:break-word; white-space:pre-wrap;}
  .msg .time{font-size:10px; color:var(--dim); margin-top:4px; font-family:var(--mono);}
  .msg.own{align-self:flex-end; flex-direction:row-reverse;}
  .msg.own .bubble{background:#241b47; border-color:var(--accent);}
  .msg.own .who{color:var(--accent);}
  .msg.own{text-align:right;}

  .mode-row{
    display:flex; align-items:center; gap:14px; padding:8px 16px; border-top:1px solid var(--border);
    background:var(--panel); font-size:12px; flex-wrap:wrap;
  }
  .mode-row label{display:flex; align-items:center; gap:5px; cursor:pointer; color:var(--dim);}
  .mode-row label:has(input:checked){color:var(--text); font-weight:600;}
  .mode-row select{
    background:var(--panel2); border:1px solid var(--border); color:var(--accent2);
    padding:5px 8px; border-radius:6px; font-size:12px; font-family:var(--mono);
  }
  .mode-row select:disabled{opacity:.4;}

  .composer{
    display:flex; gap:8px; padding:12px 16px; border-top:1px solid var(--border); background:var(--panel);
  }
  .composer input{
    flex:1; background:var(--panel2); border:1px solid var(--border); color:var(--text);
    padding:10px 12px; border-radius:8px; font-size:14px;
  }
  .composer input:disabled{opacity:.5;}
  .dm-label{font-size:10px; color:var(--accent2); margin-bottom:3px; font-family:var(--mono);}
  .bubble.dm{border-style:dashed;}
  .mention-dropdown{
    display:none; position:absolute; bottom:calc(100% + 6px); left:0; min-width:220px; max-width:320px;
    background:var(--panel2); border:1px solid var(--border); border-radius:8px;
    box-shadow:0 8px 24px rgba(0,0,0,.4); z-index:20; max-height:220px; overflow-y:auto;
  }
  .mention-dropdown.show{display:block;}
  .mention-item{display:flex; align-items:center; gap:8px; padding:7px 10px; cursor:pointer; font-size:13px;}
  .mention-item:hover, .mention-item.sel{background:var(--panel);}
  .mention-item .avatar{width:22px;height:22px;font-size:10px;}
  .mention{color:var(--accent2); font-weight:600;}
  .empty-hint{color:var(--dim); font-size:13px; text-align:center; margin:auto; max-width:320px; line-height:1.5;}
  .log{font-family:var(--mono); font-size:11px; color:var(--dim); padding:6px 16px; border-top:1px solid var(--border); max-height:70px; overflow-y:auto;}
  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--border); border-radius:4px;}
</style>
</head>
<body>

<header>
  <div class="logo">nostr<span>·</span>chat<span>·</span>sim</div>
  <input id="relayInput" type="text" value="wss://nostr.neberg.de">
  <button class="btn-ghost" id="connectBtn">Verbinden</button>
  <div class="status"><span class="dot" id="statusDot"></span><span id="statusText">getrennt</span></div>
</header>

<main>
  <aside>
    <h2>Simulierte User</h2>
    <div id="userList"></div>
    <div class="new-user">
      <input id="newName" type="text" placeholder="Name (z.B. Alice)">
      <input id="newAbout" type="text" placeholder="Über mich (optional)">
      <input id="newPicture" type="text" placeholder="Bild-URL (optional)">
      <button class="btn-primary full" id="createUserBtn">+ Neuen User erstellen</button>
      <button class="btn-danger full" id="clearBtn" style="margin-top:6px;">Alle User löschen</button>
    </div>
  </aside>

  <section class="chat">
    <div class="chat-top">
      <label>Room-Tag (#t)</label>
      <input id="roomTag" type="text" value="claude-nostr-demo">
      <button class="btn-ghost" id="applyRoomBtn">Übernehmen</button>
    </div>
    <div class="mode-row">
      <label><input type="radio" name="chatMode" id="modePublic" value="public" checked> 📢 Öffentlicher Post</label>
      <label><input type="radio" name="chatMode" id="modeDm" value="dm"> 🔒 NIP-04 DM</label>
      <span id="dmRecipientWrap" style="display:none; align-items:center; gap:6px;">
        an: <select id="dmRecipient"></select>
      </span>
    </div>
    <div id="messages"><div class="empty-hint">Noch keine Nachrichten. Erstelle links einen User, verbinde dich mit dem Relay und schreib los.</div></div>
    <div class="composer">
      <div style="position:relative; flex:1;">
        <input id="msgInput" type="text" placeholder="Zuerst einen User auswählen…" disabled style="width:100%;">
        <div id="mentionDropdown" class="mention-dropdown"></div>
      </div>
      <button class="btn-primary" id="sendBtn" disabled>Senden</button>
    </div>
    <div class="log" id="log"></div>
  </section>
</main>

<script type="module">
import { generateSecretKey, getPublicKey, finalizeEvent } from 'https://esm.sh/nostr-tools@2.7.2/pure';
import * as nip19 from 'https://esm.sh/nostr-tools@2.7.2/nip19';
import * as nip04 from 'https://esm.sh/nostr-tools@2.7.2/nip04';
import { bytesToHex, hexToBytes } from 'https://esm.sh/@noble/hashes@1.4.0/utils';

// ---------- State ----------
const LS_USERS = 'nostr_sim_users_v1';
const LS_ROOM = 'nostr_sim_room_v1';
let users = JSON.parse(localStorage.getItem(LS_USERS) || '[]'); // {sk, pk, name, about, picture}
let activePk = null;
let ws = null;
let connected = false;
let roomTag = localStorage.getItem(LS_ROOM) || 'claude-nostr-demo';
document.getElementById('roomTag').value = roomTag;

const profiles = {}; // pk -> {name, about, picture}
users.forEach(u => profiles[u.pk] = { name: u.name, about: u.about, picture: u.picture });

let knownPubkeys = new Set(users.map(u => u.pk));
let profileSubQueued = false;
let msgSubActive = false;
let chatMode = 'public'; // 'public' | 'dm'
let dmRecipientPk = null;

// ---------- DOM refs ----------
const $ = id => document.getElementById(id);
const userListEl = $('userList');
const messagesEl = $('messages');
const logEl = $('log');
const msgInput = $('msgInput');
const sendBtn = $('sendBtn');
const statusDot = $('statusDot');
const statusText = $('statusText');
const modePublic = $('modePublic');
const modeDm = $('modeDm');
const dmRecipientWrap = $('dmRecipientWrap');
const dmRecipientSelect = $('dmRecipient');
const mentionDropdown = $('mentionDropdown');

function log(msg){
  const t = new Date().toLocaleTimeString();
  logEl.innerHTML = `[${t}] ${msg}<br>` + logEl.innerHTML;
}

function saveUsers(){
  localStorage.setItem(LS_USERS, JSON.stringify(users));
}

function initials(name){
  return (name || '?').trim().slice(0,2).toUpperCase();
}

function shortPk(pk){
  return pk ? pk.slice(0,8) + '…' + pk.slice(-4) : '';
}

function avatarHtml(pk){
  const p = profiles[pk];
  if(p && p.picture){
    return `<div class="avatar"><img src="${escapeAttr(p.picture)}" onerror="this.parentElement.innerHTML='${initials(p.name)}'"></div>`;
  }
  return `<div class="avatar">${initials(p ? p.name : shortPk(pk))}</div>`;
}

function escapeHtml(s){
  return (s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s){ return escapeHtml(s); }
function regexEscape(s){ return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

// findet alle "@Name"-Erwähnungen im Text, die zu bekannten Profilen passen -> Liste von Pubkeys
function extractMentions(text){
  const found = [];
  Object.entries(profiles).forEach(([pk, p]) => {
    if(!p.name) return;
    const re = new RegExp('@' + regexEscape(p.name) + '(?![\\w])', 'i');
    if(re.test(text)) found.push(pk);
  });
  return found;
}

// baut den (bereits escapten) Nachrichtentext mit hervorgehobenen @Erwähnungen
function renderBodyWithMentions(text){
  let html = escapeHtml(text);
  Object.values(profiles).forEach(p => {
    if(!p.name) return;
    const escName = escapeHtml(p.name);
    const re = new RegExp('@' + regexEscape(escName) + '(?![\\w])', 'gi');
    html = html.replace(re, m => `<span class="mention">${m}</span>`);
  });
  return html;
}

// ---------- Render users ----------
function renderUsers(){
  userListEl.innerHTML = '';
  if(users.length === 0){
    userListEl.innerHTML = '<div style="padding:12px; color:var(--dim); font-size:12px;">Noch keine User. Erstelle unten einen.</div>';
  }
  users.forEach(u => {
    const row = document.createElement('div');
    row.className = 'user-row' + (u.pk === activePk ? ' active' : '');
    row.innerHTML = `${avatarHtml(u.pk)}<div class="user-meta"><div class="name">${escapeHtml(u.name)}</div><div class="pk">${shortPk(u.pk)}</div></div>`;
    row.onclick = () => { activePk = u.pk; renderUsers(); updateComposer(); renderAllMessages(); };
    userListEl.appendChild(row);
  });
}

function updateComposer(){
  if(activePk){
    msgInput.disabled = false;
    sendBtn.disabled = false;
    const u = users.find(x => x.pk === activePk);
    msgInput.placeholder = chatMode === 'dm' ? `DM als ${u.name}…` : `Nachricht als ${u.name}…`;
  } else {
    msgInput.disabled = true;
    sendBtn.disabled = true;
    msgInput.placeholder = 'Zuerst einen User auswählen…';
  }
  updateRecipientOptions();
}

// Empfänger-Auswahl für NIP-04 DMs: alle bekannten Profile außer dem aktiven User
function updateRecipientOptions(){
  const prev = dmRecipientSelect.value;
  dmRecipientSelect.innerHTML = '';
  const candidates = Object.entries(profiles)
    .filter(([pk]) => pk !== activePk)
    .sort((a,b) => (a[1].name||'').localeCompare(b[1].name||''));
  if(candidates.length === 0){
    const opt = document.createElement('option');
    opt.value = ''; opt.textContent = '— keine anderen User bekannt —';
    dmRecipientSelect.appendChild(opt);
    dmRecipientPk = null;
    return;
  }
  candidates.forEach(([pk, p]) => {
    const opt = document.createElement('option');
    opt.value = pk;
    opt.textContent = `${p.name || shortPk(pk)} (${shortPk(pk)})`;
    dmRecipientSelect.appendChild(opt);
  });
  dmRecipientSelect.value = candidates.some(c => c[0] === prev) ? prev : candidates[0][0];
  dmRecipientPk = dmRecipientSelect.value || null;
}

// ---------- WebSocket / relay ----------
function setStatus(state){
  statusDot.className = 'dot' + (state === 'ok' ? ' ok' : state === 'pending' ? ' pending' : '');
  statusText.textContent = state === 'ok' ? 'verbunden' : state === 'pending' ? 'verbinde…' : 'getrennt';
}

function connect(){
  const url = $('relayInput').value.trim();
  if(!url) return;
  if(ws){ try{ ws.close(); }catch(e){} }
  setStatus('pending');
  log(`Verbinde mit ${url} …`);
  ws = new WebSocket(url);

  ws.onopen = () => {
    connected = true;
    setStatus('ok');
    log('Verbunden.');
    subscribeMessages();
    if(knownPubkeys.size) queueProfileSub();
  };
  ws.onclose = () => {
    connected = false;
    setStatus('idle');
    log('Verbindung geschlossen.');
  };
  ws.onerror = (e) => {
    log('WebSocket-Fehler.');
  };
  ws.onmessage = (ev) => {
    let data;
    try{ data = JSON.parse(ev.data); }catch(e){ return; }
    const type = data[0];
    if(type === 'EVENT'){
      const event = data[2];
      handleIncomingEvent(event);
    } else if(type === 'OK'){
      log(`OK ${data[1].slice(0,8)}… akzeptiert=${data[2]} ${data[3]||''}`);
    } else if(type === 'NOTICE'){
      log('NOTICE: ' + data[1]);
    } else if(type === 'EOSE'){
      // end of stored events
    }
  };
}

function send(msg){
  if(ws && ws.readyState === WebSocket.OPEN){
    ws.send(JSON.stringify(msg));
  } else {
    log('Nicht verbunden — Nachricht konnte nicht gesendet werden.');
  }
}

function subscribeMessages(){
  const filters = ['REQ', 'chat-sub', { kinds:[1], '#t':[roomTag], limit: 100 }];
  const localPks = users.map(u => u.pk);
  if(localPks.length){
    // DMs, die an einen unserer simulierten User gehen ODER von einem unserer User gesendet wurden
    filters.push({ kinds:[4], '#p': localPks, limit: 100 });
    filters.push({ kinds:[4], authors: localPks, limit: 100 });
  }
  send(filters);
  msgSubActive = true;
}

function resubscribeMessages(){
  if(!connected) return;
  send(['CLOSE','chat-sub']);
  messagesEl.innerHTML = '';
  subscribeMessages();
}

function queueProfileSub(){
  if(profileSubQueued) return;
  profileSubQueued = true;
  setTimeout(() => {
    profileSubQueued = false;
    if(!connected || knownPubkeys.size === 0) return;
    send(['CLOSE','profile-sub']);
    send(['REQ','profile-sub', { kinds:[0], authors: Array.from(knownPubkeys) }]);
  }, 300);
}

// ---------- Handling incoming events ----------
async function handleIncomingEvent(event){
  if(!event || !event.pubkey) return;
  if(!knownPubkeys.has(event.pubkey)){
    knownPubkeys.add(event.pubkey);
    queueProfileSub();
  }
  if(event.kind === 0){
    try{
      const meta = JSON.parse(event.content);
      profiles[event.pubkey] = {
        name: meta.name || shortPk(event.pubkey),
        about: meta.about || '',
        picture: meta.picture || ''
      };
      renderUsers();
      updateRecipientOptions();
      renderAllMessages(); // refresh names/mentions on existing messages
    }catch(e){}
  } else if(event.kind === 1){
    const hasRoomTag = (event.tags||[]).some(t => t[0]==='t' && t[1]===roomTag);
    if(hasRoomTag){
      addMessageToDom(event);
    }
  } else if(event.kind === 4){
    await handleIncomingDm(event);
  }
}

// Kind-4 (NIP-04) DM: hier nur taggen, NICHT entschlüsseln.
// Entschlüsselt wird erst beim Rendern, und zwar ausschließlich aus Sicht
// des gerade aktiven Users (siehe requestDmDecryption) — sonst könnte
// ein dritter simulierter User (C) fremde DMs mitlesen, nur weil sein
// Schlüssel zufällig auch lokal gespeichert ist.
async function handleIncomingDm(event){
  const pTag = (event.tags||[]).find(t => t[0]==='p');
  event._isDm = true;
  event._dmRecipient = pTag ? pTag[1] : null;
  addMessageToDom(event);
}

// Klartext-Cache: eventId -> string | null (null = Entschlüsselung fehlgeschlagen)
const dmPlaintextCache = {};
const dmDecryptPending = new Set();

function requestDmDecryption(event){
  if(dmPlaintextCache[event.id] !== undefined) return;
  if(dmDecryptPending.has(event.id)) return;
  const viewer = users.find(u => u.pk === activePk);
  // nur entschlüsseln, wenn der AKTIVE User wirklich Sender oder Empfänger ist
  const isParticipant = viewer && (event.pubkey === activePk || event._dmRecipient === activePk);
  if(!isParticipant) return;
  dmDecryptPending.add(event.id);
  const otherPk = event.pubkey === activePk ? event._dmRecipient : event.pubkey;
  nip04.decrypt(hexToBytes(viewer.sk), otherPk, event.content)
    .then(text => { dmPlaintextCache[event.id] = text; })
    .catch(() => { dmPlaintextCache[event.id] = null; })
    .finally(() => { dmDecryptPending.delete(event.id); renderAllMessages(); });
}

// store messages so we can re-render (e.g. when a profile name arrives later)
let messageCache = [];
function addMessageToDom(event){
  if(messageCache.find(m => m.id === event.id)) return;
  messageCache.push(event);
  messageCache.sort((a,b) => a.created_at - b.created_at);
  renderAllMessages();
}

function renderAllMessages(){
  const hint = messagesEl.querySelector('.empty-hint');
  messagesEl.innerHTML = '';
  if(messageCache.length === 0){
    messagesEl.innerHTML = '<div class="empty-hint">Noch keine Nachrichten in diesem Room. Schreib die erste!</div>';
    return;
  }
  messageCache.forEach(event => {
    // DMs sind ausschließlich für Sender und Empfänger sichtbar — nicht für
    // einen dritten simulierten User, selbst wenn dessen Schlüssel lokal liegt.
    if(event._isDm){
      const isParticipant = activePk && (event.pubkey === activePk || event._dmRecipient === activePk);
      if(!isParticipant) return;
    }

    const p = profiles[event.pubkey];
    const name = p ? p.name : shortPk(event.pubkey);
    // Perspektive: Nachrichten des aktuell aktiven (chattenden) Users links,
    // alle anderen rechts. Ohne aktiven User: alle links.
    const isOther = activePk ? (event.pubkey !== activePk) : false;
    const div = document.createElement('div');
    div.className = 'msg' + (isOther ? ' own' : '');
    const time = new Date(event.created_at*1000).toLocaleTimeString();

    let dmLabel = '';
    let bodyText;
    let bubbleClass = 'bubble';
    if(event._isDm){
      bubbleClass += ' dm';
      const otherPk = event.pubkey === activePk ? event._dmRecipient : event.pubkey;
      const otherName = profiles[otherPk]?.name || shortPk(otherPk);
      const direction = event.pubkey === activePk ? `an ${escapeHtml(otherName)}` : `von ${escapeHtml(otherName)}`;
      dmLabel = `<div class="dm-label">🔒 DM ${direction}</div>`;
      const cached = dmPlaintextCache[event.id];
      if(cached === undefined){
        bodyText = '<em>🔒 wird entschlüsselt…</em>';
        requestDmDecryption(event);
      } else if(cached === null){
        bodyText = '<em>🔒 konnte nicht entschlüsselt werden</em>';
      } else {
        bodyText = renderBodyWithMentions(cached);
      }
    } else {
      bodyText = renderBodyWithMentions(event.content);
    }

    div.innerHTML = `${avatarHtml(event.pubkey)}<div class="${bubbleClass}">${dmLabel}<div class="who">${escapeHtml(name)}</div><div class="body">${bodyText}</div><div class="time">${time} · ${shortPk(event.pubkey)}</div></div>`;
    messagesEl.appendChild(div);
  });
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ---------- User creation ----------
async function createUser(){
  const name = $('newName').value.trim();
  const about = $('newAbout').value.trim();
  const picture = $('newPicture').value.trim();
  if(!name){ alert('Bitte einen Namen angeben.'); return; }

  const skBytes = generateSecretKey();
  const pk = getPublicKey(skBytes);
  const skHex = bytesToHex(skBytes);

  const user = { sk: skHex, pk, name, about, picture, created_at: Math.floor(Date.now()/1000) };
  users.push(user);
  profiles[pk] = { name, about, picture };
  knownPubkeys.add(pk);
  saveUsers();
  activePk = pk;
  renderUsers();
  updateComposer();

  $('newName').value=''; $('newAbout').value=''; $('newPicture').value='';

  // publish kind 0 metadata event
  const template = {
    kind: 0,
    created_at: Math.floor(Date.now()/1000),
    tags: [],
    content: JSON.stringify({ name, about, picture })
  };
  const signed = finalizeEvent(template, skBytes);
  send(['EVENT', signed]);
  log(`User "${name}" erstellt (${shortPk(pk)}), kind0 gesendet.`);
  resubscribeMessages(); // neue lokale Pubkey -> DM-Filter (#p) muss aktualisiert werden
}

function clearUsers(){
  if(!confirm('Wirklich alle lokal simulierten User löschen? (Nachrichten auf dem Relay bleiben bestehen)')) return;
  users = [];
  activePk = null;
  saveUsers();
  renderUsers();
  updateComposer();
  resubscribeMessages();
}

// ---------- Sending chat messages ----------
async function sendMessage(){
  const text = msgInput.value.trim();
  if(!text || !activePk) return;
  const user = users.find(u => u.pk === activePk);
  if(!user) return;
  const skBytes = hexToBytes(user.sk);
  hideMentionDropdown();

  const mentionTags = extractMentions(text).map(pk => ['p', pk, '', 'mention']);

  if(chatMode === 'dm'){
    if(!dmRecipientPk){ alert('Kein Empfänger für die DM ausgewählt.'); return; }
    let cipher;
    try{
      cipher = await nip04.encrypt(skBytes, dmRecipientPk, text);
    }catch(e){
      log('Verschlüsselung fehlgeschlagen: ' + e.message);
      return;
    }
    const template = {
      kind: 4,
      created_at: Math.floor(Date.now()/1000),
      tags: [['p', dmRecipientPk], ...mentionTags],
      content: cipher
    };
    const signed = finalizeEvent(template, skBytes);
    send(['EVENT', signed]);
    msgInput.value = '';
    // optimistisch anzeigen: wir kennen den Klartext ja bereits (wir haben ihn ja getippt)
    signed._isDm = true;
    signed._dmRecipient = dmRecipientPk;
    dmPlaintextCache[signed.id] = text;
    addMessageToDom(signed);
  } else {
    const template = {
      kind: 1,
      created_at: Math.floor(Date.now()/1000),
      tags: [['t', roomTag], ...mentionTags],
      content: text
    };
    const signed = finalizeEvent(template, skBytes);
    send(['EVENT', signed]);
    msgInput.value = '';
    // optimistic render (relay should also echo it back via subscription)
    addMessageToDom(signed);
  }
}

// ---------- Mode switch (Post vs. NIP-04 DM) ----------
function setChatMode(mode){
  chatMode = mode;
  const isDm = mode === 'dm';
  dmRecipientWrap.style.display = isDm ? 'flex' : 'none';
  updateComposer();
}
modePublic.addEventListener('change', () => { if(modePublic.checked) setChatMode('public'); });
modeDm.addEventListener('change', () => { if(modeDm.checked) setChatMode('dm'); });
dmRecipientSelect.addEventListener('change', () => { dmRecipientPk = dmRecipientSelect.value || null; });

// ---------- @Mention Dropdown im Composer ----------
let mentionState = null; // {atPos, query}
let mentionSelIndex = 0;

function getMentionMatch(){
  const pos = msgInput.selectionStart ?? msgInput.value.length;
  const before = msgInput.value.slice(0, pos);
  const m = before.match(/(?:^|\s)@([^\s@]*)$/);
  if(!m) return null;
  const atPos = pos - m[1].length - 1; // Index des '@'
  return { atPos, query: m[1], cursor: pos };
}

function mentionCandidates(query){
  const q = query.toLowerCase();
  return Object.entries(profiles)
    .filter(([pk, p]) => pk !== activePk && p.name && p.name.toLowerCase().includes(q))
    .slice(0, 6);
}

function showMentionDropdown(){
  const match = getMentionMatch();
  if(!match){ hideMentionDropdown(); return; }
  const cands = mentionCandidates(match.query);
  if(cands.length === 0){ hideMentionDropdown(); return; }
  mentionState = match;
  mentionSelIndex = 0;
  renderMentionDropdown(cands);
}

function renderMentionDropdown(cands){
  mentionDropdown.innerHTML = '';
  cands.forEach(([pk, p], i) => {
    const item = document.createElement('div');
    item.className = 'mention-item' + (i === mentionSelIndex ? ' sel' : '');
    item.innerHTML = `${avatarHtml(pk)}<span>${escapeHtml(p.name)}</span>`;
    // mousedown statt click, damit der Input nicht vorher den Blur/Selection verliert
    item.addEventListener('mousedown', (e) => { e.preventDefault(); pickMention(pk, p.name); });
    mentionDropdown.appendChild(item);
  });
  mentionDropdown.classList.add('show');
  mentionDropdown._cands = cands;
}

function hideMentionDropdown(){
  mentionDropdown.classList.remove('show');
  mentionDropdown.innerHTML = '';
  mentionState = null;
}

function pickMention(pk, name){
  if(!mentionState) return;
  const val = msgInput.value;
  const before = val.slice(0, mentionState.atPos);
  const after = val.slice(mentionState.cursor);
  const insertion = `@${name} `;
  msgInput.value = before + insertion + after;
  const newPos = (before + insertion).length;
  msgInput.focus();
  msgInput.setSelectionRange(newPos, newPos);
  hideMentionDropdown();
}

msgInput.addEventListener('input', showMentionDropdown);
msgInput.addEventListener('click', showMentionDropdown);
msgInput.addEventListener('blur', () => setTimeout(hideMentionDropdown, 150));
msgInput.addEventListener('keydown', e => {
  const cands = mentionDropdown._cands || [];
  if(mentionDropdown.classList.contains('show') && cands.length){
    if(e.key === 'ArrowDown'){ e.preventDefault(); mentionSelIndex = (mentionSelIndex+1) % cands.length; renderMentionDropdown(cands); return; }
    if(e.key === 'ArrowUp'){ e.preventDefault(); mentionSelIndex = (mentionSelIndex-1+cands.length) % cands.length; renderMentionDropdown(cands); return; }
    if(e.key === 'Enter' || e.key === 'Tab'){ e.preventDefault(); const [pk,p] = cands[mentionSelIndex]; pickMention(pk, p.name); return; }
    if(e.key === 'Escape'){ hideMentionDropdown(); return; }
  }
  if(e.key === 'Enter') sendMessage();
});

// ---------- Events ----------
$('connectBtn').onclick = connect;
$('createUserBtn').onclick = createUser;
$('clearBtn').onclick = clearUsers;
$('sendBtn').onclick = sendMessage;
$('applyRoomBtn').onclick = () => {
  roomTag = $('roomTag').value.trim() || 'claude-nostr-demo';
  localStorage.setItem(LS_ROOM, roomTag);
  messageCache = [];
  resubscribeMessages();
  log(`Room gewechselt zu #${roomTag}`);
};

// ---------- Init ----------
renderUsers();
updateComposer();
connect();
</script>
